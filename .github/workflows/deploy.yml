name: Deploy Panel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/panel
            git pull origin main
            npm install --production=false
            npm run build
            if [ $? -eq 0 ]; then
              pm2 restart panel || pm2 start /srv/panel/ecosystem.config.js
              pm2 save
              echo "✅ Deploy exitoso"
            else
              echo "❌ Build falló — servidor no reiniciado"
              exit 1
            fi
